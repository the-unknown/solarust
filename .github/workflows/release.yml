name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="solarust-${VERSION}-x86_64-linux.tar.gz"
          tar -czf "${ARCHIVE}" -C target/release solarust -C ../../ README.md LICENSE
          echo "TARBALL=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            solarust-*.tar.gz

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm rust git zstd

      - name: Build release binary
        run: cargo build --release

      - name: Create Arch package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/doc/solarust
          mkdir -p pkg/usr/share/licenses/solarust

          cp target/release/solarust pkg/usr/bin/
          cp README.md pkg/usr/share/doc/solarust/
          cp LICENSE pkg/usr/share/licenses/solarust/

          PKGSIZE=$(du -sb pkg | cut -f1)
          cat > pkg/.PKGINFO <<-EOF
          pkgname = solarust
          pkgver = ${VERSION}-1
          pkgdesc = A terminal animation of a randomly generated solar system
          url = https://github.com/the-unknown/solarust
          builddate = $(date -u +%s)
          packager = GitHub Actions
          size = ${PKGSIZE}
          arch = x86_64
          license = Apache-2.0
          EOF
          sed -i 's/^[[:space:]]*//' pkg/.PKGINFO

          cd pkg
          bsdtar -cf - .PKGINFO usr/ | zstd -o "../solarust-${VERSION}-1-x86_64.pkg.tar.zst"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  release:
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir release-assets
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.pkg.tar.zst" \) \
            -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  publish-aur:
    needs: [release]
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          pacman -Syu --noconfirm git openssh

      - name: Configure SSH for AUR
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          echo "Host aur.archlinux.org" >> /root/.ssh/config
          echo "  IdentityFile /root/.ssh/id_ed25519" >> /root/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> /root/.ssh/config

      - name: Update AUR package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/the-unknown/solarust/archive/v${VERSION}.tar.gz"

          # Download source tarball and compute checksum
          curl -sL "${TARBALL_URL}" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/solarust.git /tmp/solarust-aur

          # Update PKGBUILD
          cp aur/PKGBUILD /tmp/solarust-aur/PKGBUILD
          cd /tmp/solarust-aur
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          # Generate .SRCINFO (must run as non-root)
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

          # Commit and push (safe.directory needed after chown to builder)
          git config --global safe.directory /tmp/solarust-aur
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || {
            git commit -m "Update to ${VERSION}"
            git push
          }
