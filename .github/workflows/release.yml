name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="solarust-${VERSION}-x86_64-linux.tar.gz"
          tar -czf "${ARCHIVE}" -C target/release solarust -C ../../ README.md LICENSE
          echo "TARBALL=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            solarust-*.tar.gz

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm rust git zstd

      - name: Build release binary
        run: cargo build --release

      - name: Create Arch package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/doc/solarust
          mkdir -p pkg/usr/share/licenses/solarust

          cp target/release/solarust pkg/usr/bin/
          cp README.md pkg/usr/share/doc/solarust/
          cp LICENSE pkg/usr/share/licenses/solarust/

          PKGSIZE=$(du -sb pkg | cut -f1)
          cat > pkg/.PKGINFO <<-EOF
          pkgname = solarust
          pkgver = ${VERSION}-1
          pkgdesc = A terminal animation of a randomly generated solar system
          url = https://github.com/the-unknown/solarust
          builddate = $(date -u +%s)
          packager = GitHub Actions
          size = ${PKGSIZE}
          arch = x86_64
          license = Apache-2.0
          EOF
          sed -i 's/^[[:space:]]*//' pkg/.PKGINFO

          cd pkg
          bsdtar -cf - .PKGINFO usr/ | zstd -o "../solarust-${VERSION}-1-x86_64.pkg.tar.zst"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  release:
    needs: [build-linux, build-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir release-assets
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.pkg.tar.zst" \) \
            -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
